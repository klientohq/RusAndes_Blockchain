<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | RusAndes Blockchain</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Cpolygon points='22,2 40,12 40,32 22,42 4,32 4,12' fill='%2306091A' stroke='%23C9A84C' stroke-width='2'/%3E%3Ccircle cx='22' cy='22' r='5' fill='%23C9A84C'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--bg-0);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 300;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 400;
      color: var(--text-0);
      margin-bottom: 16px;
    }
    .error-desc {
      font-size: 16px;
      color: var(--text-2);
      margin-bottom: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="btn btn-primary">Return to RusAndes</a>
    </div>
  </main>
</body>
</html>
